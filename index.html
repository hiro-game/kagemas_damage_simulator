<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ダメージシミュレーター</title>
    <style>
        :root { --primary-color: #2563eb; --bg-color: #f8fafc; --card-bg: #ffffff; --text-color: #1e293b; --border-color: #e2e8f0; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: var(--bg-color); color: var(--text-color); line-height: 1.6; margin: 0; padding: 0; }
        .sticky-header { position: sticky; top: 0; z-index: 100; background-color: var(--bg-color); padding: 20px 20px 10px 20px; box-shadow: 0 4px 6px -4px rgba(0,0,0,0.1); }
        .container { max-width: 800px; margin: 0 auto; padding: 0 20px 20px 20px; }
        .top-bar { display: flex; justify-content: flex-end; align-items: center; margin-bottom: 10px; gap: 10px; font-size: 0.875rem; font-weight: bold; }
        .switch { position: relative; display: inline-block; width: 44px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #cbd5e1; transition: .4s; border-radius: 22px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--primary-color); }
        input:checked + .slider:before { transform: translateX(22px); }
        header h1 { text-align: center; margin: 0 0 15px 0; font-size: 1.5rem; }
        .card { background: var(--card-bg); padding: 24px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); margin-bottom: 20px; }
        h2 { margin-top: 0; font-size: 1.1rem; border-left: 4px solid var(--primary-color); padding-left: 10px; color: #1e40af; margin-bottom: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
        .styled-input { width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; box-sizing: border-box; font-size: 0.95rem; background-color: #fff; cursor: pointer; }
        .result-box { background: #eff6ff; border: 1px solid #bfdbfe; padding: 20px; border-radius: 8px; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85rem; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid var(--border-color); }
        th { background: #f1f5f9; color: #475569; }
        .highlight { font-weight: bold; color: var(--primary-color); }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; background: #e2e8f0; }
    </style>
</head>
<body>

<div class="sticky-header">
    <div class="container" style="padding-bottom: 0;">
        <div class="top-bar">
            <span>桁区切り表示</span>
            <label class="switch"><input type="checkbox" id="comma_toggle" checked onchange="updateAll()"><span class="slider"></span></label>
        </div>
        <header><h1>カゲマス 討伐イベント ダメージシミュレーター</h1></header>
        <div class="card">
            <h2 style="display: flex; justify-content: space-between;">1. ボスHP・ボーナス設定
                <button onclick="resetSettings()" style="font-size: 0.7rem; padding: 2px 8px; cursor: pointer; border: 1px solid #bfdbfe; background: #eff6ff; border-radius: 4px; color: #1e40af;">初期値に戻す</button>
            </h2>
            <div class="grid">
                <div class="input-group"><label>ボーナススコア (%)</label><input type="text" id="bonus" class="styled-input" oninput="updateAll()"></div>
            </div>
        </div>
    </div>
</div>

<div class="container" style="padding-top: 20px;">
    <div class="card">
        <h2>2. 難易度移行の損益分岐ライン</h2>
        <table><thead><tr><th>ステップ</th><th>重視項目</th><th>必要率</th><th>必要ダメ</th></tr></thead><tbody id="step-results"></tbody></table>
    </div>
    <div class="card">
        <h2>3. 現在の火力シミュレーション</h2>
        <div class="grid">
            <select id="sim_mode" class="styled-input" onchange="updateAll()">
                <option value="H">ハード</option>
                <option value="VH" selected>ベリーハード</option>
            </select>
            <input type="text" id="current_dmg" class="styled-input" placeholder="与ダメージ" oninput="syncRateFromDmg()">
            <input type="text" id="current_rate" class="styled-input" placeholder="割合(%)" oninput="syncDmgFromRate()">
        </div>
        <div id="sim_result" class="result-box">データを読み込んでいます...</div>
    </div>
</div>

<script>
    const CONFIG = { storageKey: 'raid_calc_settings', init: { bonus: 0, mode: 'VH' }, stats: { H: { ticket: 90, gp: 250, score: 85000 }, VH: { ticket: 120, gp: 1100, score: 300000 } } };
    let bossData = null;

    async function init() {
        try {
            const response = await fetch('boss_data.json');
            bossData = await response.json();
            const settings = JSON.parse(localStorage.getItem(CONFIG.storageKey) || JSON.stringify(CONFIG.init));
            document.getElementById('bonus').value = settings.bonus;
            document.getElementById('sim_mode').value = settings.mode;
            updateAll();
        } catch (e) { document.getElementById('sim_result').innerHTML = "エラー: boss_data.json読み込み失敗。サーバー経由で開いてください。"; }
    }

    function formatNum(num, isRate = false) {
        if (isRate) return parseFloat(num).toFixed(1);
        return document.getElementById('comma_toggle').checked ? Math.floor(num).toLocaleString('ja-JP') : Math.floor(num).toString();
    }
    function parseNum(str) { return parseFloat(str.toString().replace(/,/g, '')) || 0; }

    function updateAll() {
        if (!bossData) return;
        localStorage.setItem(CONFIG.storageKey, JSON.stringify({ bonus: parseNum(document.getElementById('bonus').value), mode: document.getElementById('sim_mode').value }));
        calculateLines();
        calculate();
    }

    function calculate() {
        const bonus = (parseNum(document.getElementById('bonus').value) / 100) + 1;
        const mode = document.getElementById('sim_mode').value;
        const curDmg = parseNum(document.getElementById('current_dmg').value);
        const hp = bossData[mode].hp;
        const stats = CONFIG.stats[mode];
        const rate = hp > 0 ? (curDmg / hp) : 0;

        const resScore = Math.min(stats.score * rate * bonus, stats.score * 2);
        const resGP = stats.gp * Math.min(rate, 1.0);
        const scorePerTicket = resScore / stats.ticket;

        let compareText = "";
        if(mode === "VH") {
            const hMaxEff = (CONFIG.stats.H.score * 2) / CONFIG.stats.H.ticket;
            compareText = `<p>ハード最大効率比: <strong>${hMaxEff > 0 ? (scorePerTicket / hMaxEff * 100).toFixed(1) : 0}%</strong></p>`;
        }
        document.getElementById('sim_result').innerHTML = `<p><strong>判定結果: ${mode === 'H' ? 'ハード' : 'ベリーハード'}</strong></p><ul><li>ダメージ率: <strong>${(rate * 100).toFixed(1)}%</strong></li><li>獲得スコア(込): <strong>${formatNum(resScore)}</strong></li><li>獲得GP: <strong>${resGP.toFixed(1)} pt</strong></li><li>効率(1枚あたり): <strong>${formatNum(scorePerTicket)}</strong></li></ul>${compareText}`;
    }

    function calculateLines() {
        const bonus = (parseNum(document.getElementById('bonus').value) / 100) + 1;
        const hMaxEff = (CONFIG.stats.H.score * 2) / CONFIG.stats.H.ticket;
        const rateVH = (hMaxEff * CONFIG.stats.VH.ticket) / (CONFIG.stats.VH.score * bonus);
        const line = { scoreRate: rateVH * 100, scoreDmg: bossData.VH.hp * rateVH };
        document.getElementById('step-results').innerHTML = `<tr><td><span class="badge">H→VH</span></td><td>討伐スコア</td><td class="highlight">${line.scoreRate.toFixed(1)}%</td><td>${formatNum(line.scoreDmg)}</td></tr>`;
    }

    function syncRateFromDmg() { const rate = parseNum(document.getElementById('current_dmg').value) / bossData[document.getElementById('sim_mode').value].hp * 100; document.getElementById('current_rate').value = rate.toFixed(1); updateAll(); }
    function syncDmgFromRate() { const dmg = bossData[document.getElementById('sim_mode').value].hp * (parseNum(document.getElementById('current_rate').value) / 100); document.getElementById('current_dmg').value = formatNum(dmg); updateAll(); }
    function resetSettings() { localStorage.removeItem(CONFIG.storageKey); location.reload(); }
    document.addEventListener('wheel', (e) => { if (e.target.id === 'sim_mode') { const el = e.target; el.selectedIndex += (e.deltaY > 0 ? 1 : -1); el.dispatchEvent(new Event('change')); e.preventDefault(); } }, {passive: false});
    init();
</script>
</body>
</html>
