<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ダメージシミュレーター</title>
    <style>
        :root { --primary-color: #2563eb; --bg-color: #f8fafc; --card-bg: #ffffff; --text-color: #1e293b; --border-color: #e2e8f0; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: var(--bg-color); color: var(--text-color); line-height: 1.6; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: var(--card-bg); padding: 24px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
        .styled-input { width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; box-sizing: border-box; }
        .result-box { background: #eff6ff; border: 1px solid #bfdbfe; padding: 20px; border-radius: 8px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>条件設定</h2>
        <div class="grid">
            <div class="input-group">
                <label>ボーナススコア (%)</label>
                <input type="text" id="bonus" class="styled-input" value="0" oninput="updateAll()">
            </div>
            <div class="input-group">
                <label>難易度</label>
                <select id="sim_mode" class="styled-input" onchange="updateAll()">
                    <option value="N">ノーマル</option>
                    <option value="H">ハード</option>
                    <option value="VH" selected>ベリーハード</option>
                </select>
            </div>
            <div class="input-group">
                <label>与ダメージ量</label>
                <input type="text" id="current_dmg" class="styled-input" oninput="updateAll()">
            </div>
        </div>
        <div id="sim_result" class="result-box">データを読み込んでいます...</div>
    </div>
</div>

<script>
    const CONFIG = {
        stats: {
            N:  { score: 30000 },
            H:  { score: 85000 },
            VH: { score: 300000 }
        }
    };

    let bossData = null;

    async function init() {
        try {
            const response = await fetch('boss_data.json');
            if (!response.ok) throw new Error();
            bossData = await response.json();
            updateAll();
        } catch (e) {
            document.getElementById('sim_result').innerHTML = "<p style='color:red;'>エラー: boss_data.jsonの読み込みに失敗しました。</p>";
        }
    }

    function parseNum(str) { return parseFloat(str.replace(/,/g, '')) || 0; }

    // 共通計算ロジック
    function getScore(mode, dmg, bonus) {
        const hp = bossData[mode].hp;
        const baseScore = CONFIG.stats[mode].score;
        const rate = hp > 0 ? (dmg / hp) : 0;
        
        // 基本計算：100%時のスコア * ダメージ率 * (1 + ボーナス)
        const rawScore = baseScore * rate * (1 + bonus);
        // 上限：100%時のスコア * 2
        return Math.min(rawScore, baseScore * 2);
    }

    function updateAll() {
        if (!bossData) return;
        
        const mode = document.getElementById('sim_mode').value;
        const bonus = parseNum(document.getElementById('bonus').value) / 100;
        const curDmg = parseNum(document.getElementById('current_dmg').value);
        
        const score = getScore(mode, curDmg, bonus);
        const rate = (curDmg / bossData[mode].hp) * 100;
        
        // 整数なら整数表示、そうでなければ小数第1位まで表示
        const displayRate = (rate * 10) % 10 === 0 ? Math.round(rate) : rate.toFixed(1);

        document.getElementById('sim_result').innerHTML = `
            <p><strong>判定結果: ${mode === 'N' ? 'ノーマル' : mode === 'H' ? 'ハード' : 'ベリーハード'}</strong></p>
            <ul>
                <li>ダメージ率: ${displayRate}%</li>
                <li>獲得スコア: ${Math.floor(score).toLocaleString()}</li>
            </ul>
        `;
    }

    init();
</script>
</body>
</html>
